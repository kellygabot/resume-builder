<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Resume Builder</title>
    <!-- League Spartan (headers) -->
    <link
      href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Garet (body text) via Fontshare -->
    <link
      href="https://api.fontshare.com/v2/css?f[]=garet@400,500,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="wrapper">
      <header>
        <p class="eyebrow">Database Activity</p>
        <h1>Resume Builder</h1>
        <p class="subtitle">
          Enter your details, save to MySQL, and view records.
        </p>
      </header>

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('form', event)">
          Build Resume
        </button>
        <button class="tab-btn" onclick="switchTab('view', event)">
          Saved Resumes
        </button>
      </div>

      <!-- TAB: Form -->
      <div id="tab-form" class="tab-panel active">
        <p class="section-label">Personal Information</p>
        <div class="form-grid">
          <div class="form-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" placeholder="Juan Dela Cruz" />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="juan@email.com" />
          </div>
          <div class="form-group">
            <label for="phone">Phone</label>
            <input type="text" id="phone" placeholder="+63 9xx xxx xxxx" />
          </div>
          <div class="form-group">
            <label for="address">Address</label>
            <input type="text" id="address" placeholder="City, Province" />
          </div>
        </div>

        <hr class="divider" />

        <p class="section-label">Professional Details</p>
        <div class="form-grid">
          <div class="form-group full">
            <label for="objective">Career Objective</label>
            <textarea
              id="objective"
              rows="3"
              placeholder="A brief statement about your career goals..."
            ></textarea>
          </div>
          <div class="form-group full">
            <label for="education">Education</label>
            <textarea
              id="education"
              rows="3"
              placeholder="e.g. BS Computer Science — University Name, 2021–2025"
            ></textarea>
          </div>
          <div class="form-group full">
            <label for="skills">Skills</label>
            <textarea
              id="skills"
              rows="3"
              placeholder="e.g. HTML, CSS, JavaScript, MySQL, Node.js..."
            ></textarea>
          </div>
          <div class="form-group full">
            <label for="experience">Projects / Experience</label>
            <textarea
              id="experience"
              rows="3"
              placeholder="Relevant projects, internships, or work experience..."
            ></textarea>
          </div>
        </div>

        <div class="btn-row">
          <button
            class="btn btn-primary"
            id="saveBtn"
            type="button"
            onclick="saveResume()"
          >
            Save Resume
          </button>
          <button class="btn btn-ghost" type="button" onclick="clearForm()">
            Clear
          </button>
        </div>
      </div>

      <!-- TAB: Saved Resumes -->
      <div id="tab-view" class="tab-panel">
        <div class="toolbar">
          <span id="resumeCount">—</span>
          <button
            class="btn btn-ghost"
            style="padding: 7px 16px; font-size: 12px"
            onclick="loadResumes()"
          >
            Refresh
          </button>
        </div>
        <div id="resumeList"></div>
      </div>
    </div>

    <div id="toast"></div>
    <script src="script.js"></script>
  </body>
</html>
