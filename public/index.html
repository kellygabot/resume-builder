<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    <div class="page">

      <aside class="sidebar">
        <div class="sidebar-inner">
          <div class="brand">
            <span class="brand-dot"></span>
            <span>Resume Builder</span>
          </div>
          <nav class="nav">
            <button class="nav-btn active" onclick="switchTab('form', event)" data-tab="form">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
              Build
            </button>
            <button class="nav-btn" onclick="switchTab('view', event)" data-tab="view">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
              Saved
            </button>
          </nav>
          <div class="sidebar-foot">
            <p>MySQL · Express · Node</p>
          </div>
        </div>
      </aside>

      <main class="main">

        <!-- TAB: Form -->
        <div id="tab-form" class="tab-panel active">
          <div class="main-header">
            <h1>Build your <em>resume</em></h1>
            <p>Fill in your details and save to the database.</p>
          </div>

          <div class="card">
            <div class="card-section-title">Personal</div>
            <div class="form-grid">
              <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" placeholder="Juan Dela Cruz" />
              </div>
              <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="juan@email.com" />
              </div>
              <div class="form-group">
                <label for="phone">Phone</label>
                <input type="text" id="phone" placeholder="+63 9xx xxx xxxx" />
              </div>
              <div class="form-group">
                <label for="address">Address</label>
                <input type="text" id="address" placeholder="City, Province" />
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-section-title">Professional</div>
            <div class="form-grid single">
              <div class="form-group">
                <label for="objective">Career Objective</label>
                <textarea id="objective" rows="3" placeholder="A brief statement about your career goals..."></textarea>
              </div>
              <div class="form-group">
                <label for="education">Education</label>
                <textarea id="education" rows="3" placeholder="e.g. BS Computer Science — University Name, 2021–2025"></textarea>
              </div>
              <div class="form-group">
                <label for="skills">Skills</label>
                <textarea id="skills" rows="3" placeholder="e.g. HTML, CSS, JavaScript, MySQL, Node.js..."></textarea>
              </div>
              <div class="form-group">
                <label for="experience">Projects / Experience</label>
                <textarea id="experience" rows="3" placeholder="Relevant projects, internships, or work experience..."></textarea>
              </div>
            </div>
          </div>

          <div class="actions">
            <button class="btn-save" id="saveBtn" type="button" onclick="saveResume()">Save Resume</button>
            <button class="btn-clear" type="button" onclick="clearForm()">Clear</button>
          </div>
        </div>

        <!-- TAB: Saved -->
        <div id="tab-view" class="tab-panel">
          <div class="main-header">
            <h1>Saved <em>records</em></h1>
            <div class="view-toolbar">
              <span id="resumeCount">—</span>
              <button class="btn-refresh" onclick="loadResumes()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                Refresh
              </button>
            </div>
          </div>
          <div id="resumeList"></div>
        </div>

      </main>
    </div>

    <div id="toast"></div>
    <script src="script.js"></script>
  </body>
</html>
